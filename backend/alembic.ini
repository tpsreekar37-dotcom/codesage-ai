# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, pathsep delimited, prepend to sys.path.
# Defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the number of displayed characters when showing planning summaries
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded that register custom types
# custom_compile_types = false

# logging configuration is defined at the bottom

[post_write_hooks]
# post_write_hooks defines scripts that are run after a revision is generated.

[logging]
# logging configuration
default_level = INFO
